<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TaskFlow</title>

  <!-- Modern system font -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-container">
    <header>
      <h1>TaskFlow</h1>
      <p class="subtitle">A simple, focused task manager</p>
    </header>

    <!-- AUTH SECTION -->
    <section id="auth-section" class="card">
      <h2>Welcome</h2>

      <form id="register-form" class="form">
        <h3>Create account</h3>
        <input type="email" id="register-email" placeholder="Email" required />
        <input type="password" id="register-password" placeholder="Password" required />
        <button type="submit" class="primary-btn">Register</button>
        <p id="register-message" class="message"></p>
      </form>

      <div class="divider"></div>

      <form id="login-form" class="form">
        <h3>Sign in</h3>
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Password" required />
        <button type="submit" class="primary-btn">Login</button>
        <p id="login-message" class="message"></p>
      </form>
    </section>

    <!-- TASK SECTION -->
    <section id="task-section" class="card" style="display: none;">
      <div class="task-header">
        <h2>Your Tasks</h2>
        <button id="logout-btn" class="secondary-btn">Logout</button>
      </div>

      <form id="task-form" class="form">
  <div class="form-row">
    <input type="text" id="task-title" placeholder="Task title" required />
    <input type="text" id="task-description" placeholder="Description" />
    <select id="task-status">
      <option value="todo">Todo</option>
      <option value="in progress">In Progress</option>
      <option value="done">Done</option>
    </select>
  </div>

  <div class="form-actions">
    <button type="submit" class="primary-btn">Save</button>
  </div>
</form>
      <ul id="task-list" class="task-list"></ul>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
